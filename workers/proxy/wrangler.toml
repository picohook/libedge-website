# workers/proxy/wrangler.toml
# Remote Access Proxy Worker — deploy'lanır ayrı isim altında (libedge-ra-proxy-*)
# ama ana LibEdge Worker'ı ile aynı D1 ve KV'lere bind olur.
#
# Bu dosyanın default bloğu SADECE local development için (`wrangler dev`).
# Gerçek deploy'lar `--env staging` veya `--env production` bayrağıyla yapılmalı.
# Ana wrangler.toml'daki footgun guard'ının aynısı: default isim `-local`,
# R2 ve KV staging kaynaklarına bağlı — böylece bayraksız bir `wrangler deploy`
# yanlışlıkla prod'u ezmez.

name = "libedge-ra-proxy-local"
main = "src/index.js"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "local"

# D1 (default env — staging DB'yi paylaşır, local dev için güvenli)
[[d1_databases]]
binding = "DB"
database_name = "libedge-db"
database_id = "207d80d6-7e6b-4e10-aacf-b218970dbaf8"

# R2 (default env) — staging bucket, prod bucket'a ASLA bağlanma
[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "libedge-files-staging"

# KV (default env) — staging namespace'leri, prod namespace'lerine ASLA bağlanma
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "556d17f88a7a48e381e5ffed1d150536"

[[kv_namespaces]]
binding = "RA_UPSTREAM_SESSIONS"
id = "a3a0f76dca834921b4b1000bce675037"

# ──────────────────────────────────────────────────────────────────────────
# env.staging — libedge-api-staging ile paralel
# ──────────────────────────────────────────────────────────────────────────
[env.staging]
name = "libedge-ra-proxy-staging"
routes = [
  { pattern = "proxy-staging.selmiye.com/*", zone_name = "selmiye.com" },
  { pattern = "*.selmiye.com/*",             zone_name = "selmiye.com" }
]

[env.staging.vars]
ENVIRONMENT = "staging"
RA_PROXY_BASE_HOST = "selmiye.com"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "libedge-db"
database_id = "207d80d6-7e6b-4e10-aacf-b218970dbaf8"

[[env.staging.r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "libedge-files-staging"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "556d17f88a7a48e381e5ffed1d150536"

[[env.staging.kv_namespaces]]
binding = "RA_UPSTREAM_SESSIONS"
id = "a3a0f76dca834921b4b1000bce675037"   # wrangler kv:namespace create --env staging

# ──────────────────────────────────────────────────────────────────────────
# env.production — libedge-api-prod ile paralel
# ──────────────────────────────────────────────────────────────────────────
[env.production]
name = "libedge-ra-proxy-prod"
routes = [
  { pattern = "proxy.selmiye.com/*", zone_name = "selmiye.com" },
  { pattern = "*.selmiye.com/*",     zone_name = "selmiye.com" }
]

[env.production.vars]
ENVIRONMENT = "production"
RA_PROXY_BASE_HOST = "selmiye.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "libedge-db-production"
database_id = "64e57edf-8163-4495-8874-fec00485b2ff"

[[env.production.r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "libedge-files"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "5640d9b898c54a96bdd9e361e1c6f593"

[[env.production.kv_namespaces]]
binding = "RA_UPSTREAM_SESSIONS"
id = "503551dabe024adf9afa425fa2ec1c54"   # wrangler kv:namespace create --env production

# ──────────────────────────────────────────────────────────────────────────
# Secrets — her Worker'a ayrı ayrı yüklenir (`wrangler secret put --env …`)
# ──────────────────────────────────────────────────────────────────────────
# RA_PROXY_TOKEN_SECRET    — Main Worker ile paylaşılan HS256 secret (32 byte)
# RA_CREDS_MASTER_KEY      — publisher credential AES-GCM master key (32 byte base64)
# RA_EGRESS_DEFAULT_SECRET — fallback egress HMAC secret (kurum başına rotate edili
