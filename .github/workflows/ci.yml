name: CI

on:
  pull_request:
    branches:
      - staging
      - main
  push:
    branches:
      - staging
      - main

jobs:
  test:
    name: Tests + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (backend worker)
        run: node --check backend/src/index.js

      - name: Syntax check (scripts)
        run: |
          for f in scripts/*.mjs; do
            [ -e "$f" ] || continue
            node --check "$f"
          done

      - name: Unit tests
        run: npm test
