<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Şifre sıfırla · LibEdge</title>
    <link rel="stylesheet" href="assets/css/tailwind.css">
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
    <main class="w-full max-w-md bg-white shadow-lg rounded-xl p-6 sm:p-8">
        <div class="flex justify-center mb-4">
            <img src="assets/images/libedge_logo.webp" alt="LibEdge" class="h-10">
        </div>
        <h1 class="text-2xl font-bold text-center text-primary mb-2">Şifreyi sıfırla</h1>
        <p id="resetIntro" class="text-sm text-gray-600 text-center mb-6">
            Yeni şifrenizi girin. Şifreniz en az 8 karakter olmalıdır.
        </p>

        <div id="resetStatus" class="hidden mb-4 p-3 rounded text-sm"></div>

        <form id="resetForm" class="space-y-4">
            <div>
                <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-1">Yeni şifre</label>
                <input type="password" id="newPassword" name="new-password" minlength="8" maxlength="128" autocomplete="new-password" required
                    class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-primary">
            </div>
            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Yeni şifre (tekrar)</label>
                <input type="password" id="confirmPassword" name="confirm-password" minlength="8" maxlength="128" autocomplete="new-password" required
                    class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-primary">
            </div>
            <button id="resetSubmit" type="submit"
                class="w-full bg-primary text-white py-2 rounded-lg hover:bg-opacity-90 transition disabled:opacity-60 disabled:cursor-not-allowed">
                Şifreyi güncelle
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            <a href="/" class="text-primary hover:underline">Ana sayfaya dön</a>
        </p>
    </main>

    <script>
    (function () {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || '';
        const form = document.getElementById('resetForm');
        const statusEl = document.getElementById('resetStatus');
        const submitBtn = document.getElementById('resetSubmit');
        const newPw = document.getElementById('newPassword');
        const confirmPw = document.getElementById('confirmPassword');

        function showStatus(message, kind) {
            statusEl.textContent = message;
            statusEl.className = 'mb-4 p-3 rounded text-sm ';
            if (kind === 'error') {
                statusEl.className += 'bg-red-50 text-red-700 border border-red-200';
            } else if (kind === 'success') {
                statusEl.className += 'bg-green-50 text-green-700 border border-green-200';
            } else {
                statusEl.className += 'bg-blue-50 text-blue-700 border border-blue-200';
            }
        }

        if (!token) {
            showStatus('Sıfırlama bağlantısı geçersiz. E-postanızdaki bağlantıyı kullanın.', 'error');
            submitBtn.disabled = true;
            newPw.disabled = true;
            confirmPw.disabled = true;
            return;
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const pw = newPw.value;
            const pw2 = confirmPw.value;

            if (pw.length < 8) {
                showStatus('Şifre en az 8 karakter olmalıdır.', 'error');
                return;
            }
            if (pw !== pw2) {
                showStatus('Şifreler eşleşmiyor.', 'error');
                return;
            }

            submitBtn.disabled = true;
            showStatus('Güncelleniyor…', 'info');

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ token: token, new_password: pw })
                });
                let data = null;
                try { data = await response.json(); } catch (_jsonErr) { data = null; }

                if (response.ok && data && data.success) {
                    showStatus('Şifreniz güncellendi. Birkaç saniye içinde giriş sayfasına yönlendirileceksiniz.', 'success');
                    form.classList.add('hidden');
                    setTimeout(function () {
                        window.location.href = '/';
                    }, 2500);
                } else {
                    const msg = (data && data.error) || 'Şifre güncellenemedi. Bağlantı geçersiz veya süresi dolmuş olabilir.';
                    showStatus(msg, 'error');
                    submitBtn.disabled = false;
                }
            } catch (err) {
                showStatus('Ağ hatası. Lütfen tekrar deneyin.', 'error');
                submitBtn.disabled = false;
            }
        });
    })();
    </script>
</body>
</html>
