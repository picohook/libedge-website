name = "form-handler"
main = "backend/src/index.js"
compatibility_date = "2026-03-01"
# compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "default"
WORKER_NAME = "form-handler"

# D1 Binding (default env)
[[d1_databases]]
binding = "DB"
database_name = "libedge-db"
database_id = "207d80d6-7e6b-4e10-aacf-b218970dbaf8"
migrations_dir = "migrations"

# R2 Binding (default env)
[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "libedge-files"

# KV Binding (default env)
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "36237237597442bbb7c00ab9b6ee821f"

# RA: Remote Access upstream cookie jar (ayrı KV namespace)
# Oluşturma: npx wrangler kv:namespace create RA_UPSTREAM_SESSIONS
[[kv_namespaces]]
binding = "RA_UPSTREAM_SESSIONS"
id = "d742f0d165234385bacf6ddfc0cd43e1"

# JWT_SECRET: npx wrangler secret put JWT_SECRET
# R2_PUBLIC_URL: npx wrangler secret put R2_PUBLIC_URL
# AIRTABLE_PAT: npx wrangler secret put AIRTABLE_PAT
# AIRTABLE_BASE_ID: npx wrangler secret put AIRTABLE_BASE_ID
#
# RA (Remote Access) secrets — her env için ayrı ayrı yüklenir:
# RA_PROXY_TOKEN_SECRET: npx wrangler secret put RA_PROXY_TOKEN_SECRET [--env staging|production]
# RA_CREDS_MASTER_KEY:   npx wrangler secret put RA_CREDS_MASTER_KEY   [--env staging|production]
# RA_EGRESS_DEFAULT_SECRET: npx wrangler secret put RA_EGRESS_DEFAULT_SECRET [--env staging|production]
# RA_PROXY_HOST: [vars] içinde env bazlı set edilir (aşağıda tanımlı)

# Staging environment
[env.staging]
name = "form-handler-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
WORKER_NAME = "form-handler-staging"
RA_PROXY_HOST = "proxy-staging.selmiye.com"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "libedge-db"
database_id = "207d80d6-7e6b-4e10-aacf-b218970dbaf8"

[[env.staging.r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "libedge-files-staging"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "556d17f88a7a48e381e5ffed1d150536"

# RA: Remote Access upstream cookie jar (staging)
# Oluşturma: npx wrangler kv:namespace create RA_UPSTREAM_SESSIONS --env staging
[[env.staging.kv_namespaces]]
binding = "RA_UPSTREAM_SESSIONS"
id = "a3a0f76dca834921b4b1000bce675037"

# Production environment
[env.production]
name = "form-handler-prod"

[env.production.vars]
ENVIRONMENT = "production"
WORKER_NAME = "form-handler-prod"
RA_PROXY_HOST = "proxy.selmiye.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "libedge-db-production"
database_id = "64e57edf-8163-4495-8874-fec00485b2ff"

[[env.production.r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "libedge-files"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "5640d9b898c54a96bdd9e361e1c6f593"

# RA: Remote Access upstream cookie jar (production)
# Oluşturma: npx wrangler kv:namespace create RA_UPSTREAM_SESSIONS --env production
[[env.production.kv_namespaces]]
binding = "RA_UPSTREAM_SESSIONS"
id = "503551dabe024adf9afa425fa2ec1c54"
