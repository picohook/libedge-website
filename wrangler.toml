name = "form-handler"
main = "backend/src/index.js"
compatibility_date = "2026-03-01"

# D1 Binding
[[d1_databases]]
binding = "DB"
database_name = "libedge-db"
database_id = "207d80d6-7e6b-4e10-aacf-b218970dbaf8"

# JWT_SECRET buraya yazma — terminalde şu komutla ekle:
# npx wrangler secret put JWT_SECRET
# npx wrangler secret put JWT_SECRET --env staging
# npx wrangler secret put JWT_SECRET --env production

# Staging environment
[env.staging]
name = "form-handler-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "libedge-db"
database_id = "207d80d6-7e6b-4e10-aacf-b218970dbaf8"

# Production environment
[env.production]
name = "form-handler-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "libedge-db"
database_id = "207d80d6-7e6b-4e10-aacf-b218970dbaf8"